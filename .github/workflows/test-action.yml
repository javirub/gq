name: Test gq Action

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-action:
    name: Action (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Create test fixture
        shell: bash
        run: |
          printf 'name: {{ .Environment.Name }}\nreplicas: 3\n' > values.yaml.gotmpl
      - name: Edit templated file with the gq action
        uses: ./
        with:
          cmd: -i '.replicas = 5' values.yaml.gotmpl
      - name: Read back a value
        id: read
        uses: ./
        with:
          cmd: "'.replicas' values.yaml.gotmpl"
      - name: Verify
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'replicas: 5' values.yaml.gotmpl
          grep -q 'name: {{ .Environment.Name }}' values.yaml.gotmpl
          test "${{ steps.read.outputs.result }}" = "5"
