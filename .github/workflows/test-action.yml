name: Test gq Action

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-action:
    name: Action (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
      - name: Create test fixture
        shell: bash
        run: |
          printf 'name: {{ .Environment.Name }}\nreplicas: 3\n' > values.yaml.gotmpl
      - name: Edit templated file with the gq action
        uses: ./
        with:
          cmd: -i '.replicas = 5' values.yaml.gotmpl
      - name: Read back a value
        id: read
        uses: ./
        with:
          cmd: "'.replicas' values.yaml.gotmpl"
      - name: Verify
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'replicas: 5' values.yaml.gotmpl
          grep -q 'name: {{ .Environment.Name }}' values.yaml.gotmpl
          test "${{ steps.read.outputs.result }}" = "5"
